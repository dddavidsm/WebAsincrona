<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API REST CRUD</title>
  <style>
    body { font-family: sans-serif; background: #f6f6f6; margin: 0; padding: 0; }
    .container { max-width: 700px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 2em; }
    h1 { text-align: center; }
    form, .crud-list { margin-bottom: 2em; }
    label { display: block; margin-top: 1em; }
    input, button { padding: 0.5em; margin-top: 0.5em; width: 100%; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; margin-top: 1em; }
    th, td { border: 1px solid #ddd; padding: 0.5em; text-align: left; }
    th { background: #eee; }
    .actions { display: flex; gap: 0.5em; }
    .actions button { width: auto; }
    #pagination-controls { display: flex; align-items: center; justify-content: center; gap: 0.75em; margin-top: 1em; }
    #pagination-controls button {
      width: auto;
      padding: 0.55em 1.1em;
      border: 1px solid #cfd4dc;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff 0%, #f0f3f7 100%);
      color: #1f2937;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }
    #pagination-controls button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px #0000001a;
      background: linear-gradient(180deg, #ffffff 0%, #e7edf5 100%);
    }
    #pagination-controls button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    #page-info { font-weight: 700; color: #374151; min-width: 7.5em; text-align: center; }
    #error-msg { color: red; margin-top: 1em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>API REST CRUD</h1>
    <form id="create-form">
      <h2>Crea un producte</h2>
      <label>Nom <input name="nom" required></label>
      <label>Preu <input name="preu" type="number" step="0.01" required></label>
      <button type="submit">Crear</button>
    </form>
    <div class="crud-list">
      <h2>Llista de productes</h2>
      <p> Quan s'esborra un producte, es borra de la llista, pero el producte no s'esborra de la base de dades, passa a (discontinued = 1)</p>
      <table id="products-table">
        <thead>
          <tr><th>ID</th><th>Nom</th><th>Preu</th><th>Accions</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <form id="update-form" style="display:none">
      <h2>Modifica producte</h2>
      <input name="id" type="hidden">
      <label>Nom <input name="nom" required></label>
      <label>Preu <input name="preu" type="number" step="0.01" required></label>
      <button type="submit">Actualitzar</button>
      <button type="button" id="cancel-update">Cancel·la</button>
    </form>

    <div id="pagination-controls">
  <button id="btn-prev" disabled>Anterior</button>
  <span id="page-info">Pàgina 1</span>
  <button id="btn-next">Següent</button>
</div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
